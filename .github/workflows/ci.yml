name: CI

on:
  push:
    branches: [main]
    paths: ['procureflow/**']
  pull_request:
    branches: [main]
    paths: ['procureflow/**']

defaults:
  run:
    working-directory: procureflow

jobs:
  lint-typecheck-test:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: procureflow/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npx next lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx vitest run --reporter=verbose

  docker-build:
    name: Docker Build (smoke test)
    runs-on: ubuntu-latest
    needs: lint-typecheck-test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t procureflow:ci .
        working-directory: procureflow
